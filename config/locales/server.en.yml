en:
  site_settings:
    discourse_custom_default_sidebars_enabled: "Enable per-user default sidebar categories. Requires <a href='%{base_path}/admin/site_settings/category/all_results?filter=default_navigation_menu_categories'>default_navigation_menu_categories</a> to be set — rules only override the existing defaults for matching users; users who don't match any rule fall back to that setting's categories."
    default_navigation_menu_categories_rules: "Rules that override <a href='%{base_path}/admin/site_settings/category/all_results?filter=default_navigation_menu_categories'>default_navigation_menu_categories</a> for specific users when they sign up. A user's sidebar gets the first rule whose locale matches their user locale; if no rule matches, they fall back to the default categories."
    apply_rules_to_anonymous_users: "Apply the same rules to anonymous visitors, matching the rule locale against the request locale (from the Accept-Language header, cookie, or param). When disabled, anonymous visitors always see <a href='%{base_path}/admin/site_settings/category/all_results?filter=default_navigation_menu_categories'>default_navigation_menu_categories</a>."
